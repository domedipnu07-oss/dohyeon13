<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기초면역학 - 의학용어 퀴즈</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f3f4f6;
            --text-color: #333;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background-color: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            position: relative;
        }

        .header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .progress-bar {
            height: 6px;
            background-color: #ddd;
            width: 100%;
        }

        .progress {
            height: 100%;
            background-color: var(--success-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-body {
            padding: 30px;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: var(--secondary-color);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 15px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
        }

        .option-btn:hover {
            background-color: #e5e7eb;
            transform: translateY(-2px);
        }

        .option-btn.selected {
            border-color: var(--primary-color);
            background-color: #ebf5ff;
        }

        .option-btn.correct {
            background-color: #d4edda;
            border-color: var(--success-color);
            color: #155724;
        }

        .option-btn.wrong {
            background-color: #f8d7da;
            border-color: var(--error-color);
            color: #721c24;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .next-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            display: none;
        }

        .next-btn:hover {
            background-color: #357abd;
        }

        .feedback-text {
            font-weight: 600;
            font-size: 1rem;
            flex-grow: 1;
        }
        
        .explanation {
            margin-top: 15px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 4px solid var(--primary-color);
            border-radius: 4px;
            font-size: 0.95rem;
            display: none;
            line-height: 1.5;
        }

        .result-container {
            text-align: center;
            display: none;
        }

        .result-score {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 20px 0;
        }

        .result-message {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #666;
        }

        .restart-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        .restart-btn:hover {
            background-color: #357abd;
        }

        /* 뱃지 스타일 */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 10px;
            background-color: #e1effe;
            color: #1e40af;
        }

    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="header" id="quiz-header">
            <h1>🩺 의학용어 퀴즈 테스트</h1>
            <p>기초면역학 - 접두사 및 주요 용어 복습</p>
        </div>
        <div class="progress-bar" id="progress-bar-container">
            <div class="progress" id="progress"></div>
        </div>

        <div class="quiz-body">
            <!-- 문제 화면 -->
            <div id="quiz-screen">
                <span class="badge" id="question-counter">문제 1 / 10</span>
                <div class="question-text" id="question-text">질문이 여기에 표시됩니다.</div>
                <div class="options-container" id="options">
                    <!-- 옵션 버튼들이 자바스크립트에 의해 생성됩니다 -->
                </div>
                
                <div class="explanation" id="explanation">
                    <!-- 해설이 여기에 표시됩니다 -->
                </div>

                <div class="controls">
                    <div class="feedback-text" id="feedback"></div>
                    <button class="next-btn" id="next-btn">다음 문제 ➔</button>
                </div>
            </div>

            <!-- 결과 화면 -->
            <div class="result-container" id="result-screen">
                <h2>🎉 테스트 완료!</h2>
                <div class="result-score" id="score-display">0 / 10</div>
                <div class="result-message" id="result-message">수고하셨습니다!</div>
                <button class="restart-btn" id="restart-btn">다시 풀기 ↺</button>
            </div>
        </div>
    </div>

    <script>
        // 강의 자료를 기반으로 한 문제 데이터 구성
        const quizData = [
            {
                question: "'Brady-' 접두사가 의미하는 것은 무엇인가요?",
                options: ["느린 (Slow)", "빠른 (Fast)", "위 (Above)", "아래 (Below)"],
                correctAnswer: 0,
                explanation: "예: Bradycardia (서맥, 느린맥). 반대로 'Tachy-'는 빠른(Fast)을 의미합니다."
            },
            {
                question: "혈당이 비정상적으로 낮은 상태를 의미하는 용어는?",
                options: ["Hyperkalemia", "Hypoglycemia", "Ectopia", "Endoscopy"],
                correctAnswer: 1,
                explanation: "Hypo-(아래, 부족) + glyc/o(당) + -emia(혈액 상태) = 저혈당증(Hypoglycemia)."
            },
            {
                question: "다음 중 '많은(many)'을 의미하는 접두사(Number Prefix)는?",
                options: ["oligo-", "mono-", "poly-", "hemi-"],
                correctAnswer: 2,
                explanation: "예: Polycystic (다낭성의). 'oligo-'는 적은, 'mono-'는 하나, 'hemi-'는 절반을 의미합니다."
            },
            {
                question: "'Dysplasia'에서 'dys-' 접두사가 의미하는 것은?",
                options: ["좋은/정상 (Good/Normal)", "나쁜/비정상/어려운 (Bad/Abnormal)", "다시 (Again)", "스스로 (Self)"],
                correctAnswer: 1,
                explanation: "예: Dysplasia (이형성증, 발달이상). 반대로 'eu-'는 좋은/정상(예: Euphoria)을 의미합니다."
            },
            {
                question: "'Postpartum'에서 'post-'가 의미하는 것은?",
                options: ["이전 (Before)", "이후 (After)", "중간 (Middle)", "주변 (Around)"],
                correctAnswer: 1,
                explanation: "예: Postpartum (산후의). 'pre-'는 이전(예: Preterm)을 의미합니다."
            },
            {
                question: "소변량이 비정상적으로 적은 상태를 나타내는 'Oligouria'에서 'oligo-'가 뜻하는 것은?",
                options: ["적은 (Scanty/Few)", "많은 (Many)", "절반 (Half)", "둘 (Two)"],
                correctAnswer: 0,
                explanation: "Oligo-는 '적은, 부족한'을 의미합니다. (예: Oligouria - 핍뇨, 소변감소증)"
            },
            {
                question: "'Macrophage(대식세포)'에서 'macro-'가 의미하는 것은?",
                options: ["작은 (Small)", "큰 (Large)", "하나 (One)", "여러 개 (Multiple)"],
                correctAnswer: 1,
                explanation: "Macro-는 '큰(Large)'을 의미합니다. 반대말은 'micro-'(작은) 입니다."
            },
            {
                question: "심장 박동이 비정상적으로 빠른 상태(빈맥)를 의미하는 용어는?",
                options: ["Bradycardia", "Tachycardia", "Hyperkalemia", "Hypoglycemia"],
                correctAnswer: 1,
                explanation: "Tachy-(빠른) + -cardia(심장상태) = Tachycardia (빈맥, 빠른맥)."
            },
            {
                question: "몸 안을 들여다보는 검사인 'Endoscopy(내시경)'에서 'endo-'가 의미하는 것은?",
                options: ["바깥 (Outside)", "위 (Upon)", "안쪽 (Within/Inner)", "주변 (Around)"],
                correctAnswer: 2,
                explanation: "Endo-는 '안쪽(Within)'을 의미합니다. 반대말인 Ecto-는 '바깥'을 의미합니다."
            },
            {
                question: "세포나 조직을 스스로 파괴하거나 부검을 의미하는 'Autopsy'에서 'auto-'의 의미는?",
                options: ["다시 (Again)", "스스로 (Self)", "반대 (Against)", "함께 (Together)"],
                correctAnswer: 1,
                explanation: "Auto-는 '자신의, 스스로(Self)'를 의미합니다."
            }
        ];

        // 상태 변수
        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        // DOM 요소
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options');
        const questionCounter = document.getElementById('question-counter');
        const nextBtn = document.getElementById('next-btn');
        const feedbackText = document.getElementById('feedback');
        const explanationBox = document.getElementById('explanation');
        const progressBar = document.getElementById('progress');
        
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const scoreDisplay = document.getElementById('score-display');
        const resultMessage = document.getElementById('result-message');
        const restartBtn = document.getElementById('restart-btn');

        // 퀴즈 초기화 및 첫 문제 로드
        function initQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            quizScreen.style.display = 'block';
            resultScreen.style.display = 'none';
            loadQuestion();
        }

        // 문제 로드 함수
        function loadQuestion() {
            answered = false;
            const currentQuestion = quizData[currentQuestionIndex];
            
            // UI 업데이트
            questionText.textContent = currentQuestion.question;
            questionCounter.textContent = `문제 ${currentQuestionIndex + 1} / ${quizData.length}`;
            progressBar.style.width = `${((currentQuestionIndex) / quizData.length) * 100}%`;
            
            // 초기화
            optionsContainer.innerHTML = '';
            feedbackText.textContent = '';
            explanationBox.style.display = 'none';
            nextBtn.style.display = 'none';

            // 옵션 버튼 생성
            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.classList.add('option-btn');
                button.textContent = option;
                button.onclick = () => selectOption(index, button);
                optionsContainer.appendChild(button);
            });
        }

        // 정답 선택 처리
        function selectOption(selectedIndex, selectedButton) {
            if (answered) return; // 이미 답을 골랐으면 클릭 방지
            answered = true;

            const currentQuestion = quizData[currentQuestionIndex];
            const isCorrect = selectedIndex === currentQuestion.correctAnswer;
            const buttons = optionsContainer.querySelectorAll('.option-btn');

            // 모든 버튼 비활성화
            buttons.forEach(btn => btn.style.cursor = 'default');

            if (isCorrect) {
                selectedButton.classList.add('correct');
                feedbackText.textContent = '✅ 정답입니다!';
                feedbackText.style.color = 'var(--success-color)';
                score++;
            } else {
                selectedButton.classList.add('wrong');
                feedbackText.textContent = '❌ 오답입니다.';
                feedbackText.style.color = 'var(--error-color)';
                
                // 정답 표시
                buttons[currentQuestion.correctAnswer].classList.add('correct');
            }

            // 해설 표시
            explanationBox.textContent = currentQuestion.explanation;
            explanationBox.style.display = 'block';

            // 다음 문제 버튼 표시
            nextBtn.style.display = 'block';
            if (currentQuestionIndex === quizData.length - 1) {
                nextBtn.textContent = '결과 보기 ➔';
            } else {
                nextBtn.textContent = '다음 문제 ➔';
            }
        }

        // 다음 문제 혹은 결과 화면으로 이동
        nextBtn.addEventListener('click', () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        // 결과 화면 표시
        function showResults() {
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            progressBar.style.width = '100%';

            scoreDisplay.textContent = `${score} / ${quizData.length}`;

            // 점수에 따른 메시지
            const percentage = (score / quizData.length) * 100;
            if (percentage === 100) {
                resultMessage.innerHTML = "완벽합니다! 🏆<br>의학용어 마스터이시군요!";
            } else if (percentage >= 70) {
                resultMessage.innerHTML = "훌륭합니다! 👍<br>대부분의 용어를 잘 이해하고 계십니다.";
            } else if (percentage >= 40) {
                resultMessage.innerHTML = "좋습니다! 😊<br>조금만 더 복습하면 완벽해질 거예요.";
            } else {
                resultMessage.innerHTML = "화이팅! 💪<br>강의 자료를 한 번 더 복습해 보세요.";
            }
        }

        // 다시 풀기 버튼 이벤트
        restartBtn.addEventListener('click', initQuiz);

        // 앱 시작
        initQuiz();
    </script>
</body>
</html>
